<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Parameter Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <header class="masthead">
    <div class="masthead-inner">
      <div class="masthead-left">
        <div class="masthead-brand">PARAMETER REVIEW</div>
        <div class="masthead-sub">Daily Automated Audit</div>
      </div>
      <div class="masthead-right">
        <div class="masthead-date" id="masthead-date"></div>
        <div class="masthead-meta" id="masthead-meta"></div>
      </div>
    </div>
  </header>

  <div class="report-wrapper">
    <!-- Summary Overview -->
    <section class="summary-overview" id="summary-overview" aria-label="Report summary">
      <div class="summary-grid">
        <div class="summary-kpis" id="summary-kpis"></div>
        <div class="summary-chart-donut" id="summary-donut" aria-label="Rule status breakdown"></div>
        <div class="summary-chart-bars" id="summary-bars" aria-label="Issues by rule"></div>
      </div>
    </section>

    <div class="layout">
      <!-- Left Rail -->
      <aside class="rail" id="rail" role="navigation" aria-label="Report navigation">
        <button class="rail-toggle" id="rail-toggle" aria-expanded="false" aria-controls="rail-inner">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>Navigation</span>
        </button>
        <div class="rail-inner" id="rail-inner">
          <div class="rail-section">
            <div class="rail-label">Report Date</div>
            <ul class="date-list" id="date-list" role="listbox" aria-label="Select report date"></ul>
          </div>
          <div class="rail-rule"></div>
          <div class="rail-section">
            <div class="rail-label">Sections</div>
            <nav>
              <ul class="chapter-nav" id="chapter-nav" aria-label="Chapter navigation"></ul>
            </nav>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main" id="main-content" role="main">
        <div class="chapters" id="chapters"></div>
      </main>
    </div>
  </div>

  <footer class="report-footer">
    <span>OKX Parameter Management</span>
    <span class="footer-sep">&middot;</span>
    <span>Automated Daily Review</span>
    <span class="footer-sep">&middot;</span>
    <span id="footer-date"></span>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
