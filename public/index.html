<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Parameter Review Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Hero Summary Band -->
  <header class="hero" role="banner">
    <div class="hero-top">
      <h1 class="hero-title">Daily Parameter Review</h1>
      <time class="hero-timestamp" id="hero-timestamp"></time>
    </div>
    <div class="hero-metrics" id="hero-metrics" role="group" aria-label="Summary metrics">
      <!-- Rendered by JS -->
    </div>
  </header>

  <div class="layout">
    <!-- Left Rail -->
    <aside class="rail" id="rail" role="navigation" aria-label="Report navigation">
      <button class="rail-toggle" id="rail-toggle" aria-expanded="false" aria-controls="rail-inner">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Navigation</span>
      </button>
      <div class="rail-inner" id="rail-inner">
        <div class="rail-section">
          <h2 class="rail-heading">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M2 6h12" stroke="currentColor" stroke-width="1.5"/>
              <path d="M6 6v8" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            Report Date
          </h2>
          <ul class="date-list" id="date-list" role="listbox" aria-label="Select report date">
            <!-- Rendered by JS -->
          </ul>
        </div>
        <hr class="rail-divider">
        <div class="rail-section">
          <h2 class="rail-heading">Chapters</h2>
          <nav>
            <ul class="chapter-nav" id="chapter-nav" aria-label="Chapter navigation">
              <!-- Rendered by JS -->
            </ul>
          </nav>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main" id="main-content" role="main">
      <div class="chapters" id="chapters">
        <!-- Rendered by JS -->
      </div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
