name: Afternoon Review + Lark

on:
  schedule:
    - cron: '30 8 * * *'   # 16:30 HKT — full review + deploy + Lark
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-review
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Collect EMA data (15 min)
        run: python -m runner.ema_collector --timeout 900
        continue-on-error: true

      - name: Generate daily report (no Lark yet)
        run: python -m runner.main --no-lark

      - name: Commit and push report data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --cached --quiet || git commit -m "Daily review $(date -u +%Y-%m-%d)"
          git push

      - name: Wait for Vercel deploy
        run: |
          echo "Waiting 90 seconds for Vercel to deploy..."
          sleep 90

      - name: Send Lark notification
        run: python -m runner.notify_lark
