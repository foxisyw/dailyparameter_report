name: Daily Parameter Review

on:
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC daily
  workflow_dispatch:       # manual trigger

concurrency:
  group: daily-review
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Collect EMA data (10-15 min)
        run: python -m runner.ema_collector --timeout 900
        continue-on-error: true  # EMA is optional; reviews still work without it

      - name: Run daily review and upload to Blob
        run: python -m runner.main
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
