name: Daily Parameter Review

on:
  schedule:
    - cron: '0 1 * * *'    # 09:00 HKT — morning review (no Lark)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-review
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Collect EMA data
        run: python -m runner.ema_collector --timeout 900
        continue-on-error: true

      - name: Generate daily report (no Lark)
        run: python -m runner.main --no-lark

      - name: Commit and push report data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Daily review $(date -u +%Y-%m-%d)"
          # Pull rebase to handle any local pushes that happened during the run
          git pull --rebase origin main || true
          git push || echo "Push failed — likely a conflict with a local push. Report was still generated."
