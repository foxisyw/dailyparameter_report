name: Daily Parameter Review

on:
  schedule:
    - cron: '0 1 * * *'    # 09:00 HKT — morning review
    - cron: '0 5 * * *'    # 13:00 HKT — afternoon review
    - cron: '30 8 * * *'   # 16:30 HKT — Lark summary (after Vercel deployed)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-review
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Collect EMA data
        run: python -m runner.ema_collector --timeout 900
        continue-on-error: true

      - name: Generate daily report and send Lark notification
        run: python -m runner.main

      - name: Commit and push report data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --cached --quiet || git commit -m "Daily review $(date -u +%Y-%m-%d)"
          git push
